<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Log in · Reception</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth">
  <div class="auth-top"><a class="brand" href="/">Reception</a></div>
  <main class="auth-main">
    <form class="card" id="form" method="post" action="/login">
      <h1>Welcome back</h1>
      <p class="sub">Log in to talk to the receptionist.</p>
      <div class="error" id="error"></div>
      <div class="field">
        <label for="email">Email</label>
        <input class="input" id="email" name="email" type="email" placeholder="you@example.com" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input class="input" id="password" name="password" type="password" placeholder="Your password" required>
      </div>
      <button class="btn" type="submit">Log in</button>
      <p class="alt">Need an account? <a href="/register">Create one</a></p>
    </form>
  </main>
  <script type="module" src="/static/js/auth.js"></script>
</body>
</html>

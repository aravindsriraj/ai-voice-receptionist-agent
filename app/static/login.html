<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Log in · Reception</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="auth">
    <aside class="brand-panel">
      <a class="brand on-teal" href="/"><span class="dot"></span> Reception</a>
      <div class="pitch">
        <h1>Welcome back.</h1>
        <p>Log in to talk to your receptionist or book an appointment.</p>
        <ul class="ticks">
          <li><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg> Real-time voice booking</li>
          <li><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg> Confirmations by email</li>
          <li><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg> Reminders before every visit</li>
        </ul>
      </div>
    </aside>
    <main class="form-panel">
      <form class="form-wrap" id="form" method="post" action="/login">
        <h2>Log in</h2>
        <p class="sub">Good to see you again.</p>
        <div class="error" id="error"></div>
        <div class="field">
          <label for="email">Email</label>
          <input class="input" id="email" name="email" type="email" placeholder="you@example.com" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input class="input" id="password" name="password" type="password" placeholder="Your password" required>
        </div>
        <button class="btn" type="submit">Log in</button>
        <p class="alt">Need an account? <a href="/register">Create one</a></p>
      </form>
    </main>
  </div>
  <script type="module" src="/static/js/auth.js"></script>
</body>
</html>

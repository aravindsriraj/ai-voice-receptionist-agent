<!doctype html><meta charset="utf-8"><title>Register</title>
<h1>Create account</h1>
<form method="post" action="/register">
  <input name="name" placeholder="Full name" required><br>
  <input name="email" type="email" placeholder="Email" required><br>
  <input name="password" type="password" placeholder="Password (min 6)" required><br>
  <input name="country_code" placeholder="Country code e.g. 91" required style="width:6em">
  <input name="mobile" placeholder="Mobile number" required><br>
  <button>Register</button>
</form>
<p><a href="/login">Already have an account? Log in</a></p>
